on:
  - push
permissions:
  contents: read
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # ratchet:actions/checkout@v6
      - uses: jdx/mise-action@146a28175021df8ca24f8ee1828cc2a60f980bd5 # ratchet:jdx/mise-action@v3
        with:
          cache: false
      - name: Lint
        run: shellcheck setup.sh
      - name: Format check
        run: shfmt --diff setup.sh

  test-action:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # ratchet:actions/checkout@v6
      - name: Test action (latest version)
        uses: ./
        with:
          version: latest
      - name: Verify installation
        run: nais --version

  test-specific-version:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # ratchet:actions/checkout@v6
      - name: Test action (specific version)
        uses: ./
        with:
          version: "v3.8.3"
      - name: Verify specific version
        run: |
          version_output="$(nais --version)"
          if [[ "$version_output" == *"3.8.3"* ]]; then
            echo "Correct version v3.8.3 installed"
          else
            echo "Expected v3.8.3, got: $version_output"
            exit 1
          fi
